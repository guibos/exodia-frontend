<main class="container" role="main">

    <h1 class="mt-5">Album form</h1>

    <p class="lead">Choice release set that you want to print.</p>

    <form class="example-form">
        <mat-form-field class="example-full-width" appearance="fill">
            <mat-label>Product</mat-label>
            <input type="text" matInput [formControl]="myControl" [matAutocomplete]="auto">
            <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn">
                <mat-option *ngFor="let option of filteredOptions | async" [value]="option" (click)="submit()">
                    {{option.name}}
                </mat-option>
            </mat-autocomplete>
        </mat-form-field>
    </form>
    <pre>Form Values: {{myControl.value | json}}</pre>


</main>
